spring.application.name=Api Gateway
server.port=${PORT:80}

# Service-to-service authentication token
app.service.token=${APP_SERVICE_TOKEN:clouddrive-internal-token-2024}

# Backend service URLs (for Render, these will be internal hostnames)
app.fileservice.url=${FILESERVICE_URL:http://fileservice:80}
app.folderservice.url=${FOLDERSERVICE_URL:http://folderservice:80}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

