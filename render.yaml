# Render Blueprint for CloudDrive API Gateway
# https://render.com/docs/blueprint-spec
#
# This service requires fileservice and folderservice to be deployed first.
# After deploying them, set FILESERVICE_URL and FOLDERSERVICE_URL in Render Dashboard.
#
# Set these env vars in Render Dashboard:
#   - FILESERVICE_URL: https://clouddrive-fileservice.onrender.com (or internal URL)
#   - FOLDERSERVICE_URL: https://clouddrive-folderservice.onrender.com (or internal URL)
#   - APP_SERVICE_TOKEN: clouddrive-internal-token-2024

services:
  - type: web
    name: clouddrive-gateway
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 80
      - key: APP_SERVICE_TOKEN
        sync: false  # Set manually - must match other services
      - key: FILESERVICE_URL
        sync: false  # Set after fileservice deploys
      - key: FOLDERSERVICE_URL
        sync: false  # Set after folderservice deploys
